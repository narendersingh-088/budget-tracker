<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Budget Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="noise"></div>

  <header>
    <div class="logo">₿udget<span>.</span></div>
    <div class="header-meta">
      <span id="current-month"></span>
    </div>
  </header>

  <main>

    <!-- Summary Cards -->
    <section class="summary-grid">
      <div class="card card--income">
        <div class="card-label">Total Income</div>
        <div class="card-amount" id="total-income">₹0.00</div>
        <div class="card-bar"><div class="bar-fill bar-fill--income" id="income-bar"></div></div>
      </div>
      <div class="card card--expense">
        <div class="card-label">Total Expenses</div>
        <div class="card-amount" id="total-expense">₹0.00</div>
        <div class="card-bar"><div class="bar-fill bar-fill--expense" id="expense-bar"></div></div>
      </div>
      <div class="card card--balance">
        <div class="card-label">Net Balance</div>
        <div class="card-amount" id="net-balance">₹0.00</div>
        <div class="balance-status" id="balance-status">—</div>
      </div>
    </section>

    <!-- Add Transaction -->
    <section class="add-section">
      <div class="section-title">New Transaction</div>
      <div class="form-row">
        <input type="text" id="tx-desc" placeholder="Description (e.g. Salary, Rent...)" autocomplete="off" />
        <input type="number" id="tx-amount" placeholder="Amount (₹)" min="0" step="0.01" />
        <select id="tx-category">
          <option value="Food">🍔 Food</option>
          <option value="Transport">🚌 Transport</option>
          <option value="Shopping">🛍 Shopping</option>
          <option value="Health">💊 Health</option>
          <option value="Entertainment">🎬 Entertainment</option>
          <option value="Bills">💡 Bills</option>
          <option value="Income" selected>💰 Income</option>
          <option value="Other">📦 Other</option>
        </select>
        <div class="type-toggle">
          <button class="toggle-btn active" data-type="income" id="btn-income">Income</button>
          <button class="toggle-btn" data-type="expense" id="btn-expense">Expense</button>
        </div>
        <button id="add-btn" onclick="addTransaction()">+ Add</button>
      </div>
    </section>

    <!-- Transactions List -->
    <section class="list-section">
      <div class="list-header">
        <div class="section-title">Transactions</div>
        <div class="filter-row">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="income">Income</button>
          <button class="filter-btn" data-filter="expense">Expenses</button>
        </div>
        <button class="clear-btn" onclick="clearAll()">Clear All</button>
      </div>

      <div id="tx-list" class="tx-list">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">📊</div>
          <p>No transactions yet.<br>Add your first entry above.</p>
        </div>
      </div>
    </section>

    <!-- Category Breakdown -->
    <section class="breakdown-section">
      <div class="section-title">Category Breakdown</div>
      <div id="category-breakdown" class="category-grid"></div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
